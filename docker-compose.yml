services:
  second-brain-mcp:
    build: .
    environment:
      MCP_TRANSPORT: http
      HOST: 0.0.0.0
      PORT: 3000
      MCP_HTTP_PATH: /mcp
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,second-brain-mcp}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SECOND_BRAIN_ROOT: /data/second-brain
      SECOND_BRAIN_REJECTED_RETENTION_DAYS: ${SECOND_BRAIN_REJECTED_RETENTION_DAYS:-30}
    ports:
      - "${SECOND_BRAIN_MCP_PORT:-3000}:3000"
    volumes:
      - second-brain-data:/data/second-brain
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  second-brain-data:
